# Render Blueprint: single Docker web service serving the API + frontend.
# Create the database separately (e.g. Neon) and set DATABASE_URL in the
# Render dashboard. Render injects PORT automatically.
services:
  - type: web
    name: nutcracker
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false # set in dashboard (Neon connection string, sslmode=require)
      - key: COOKIE_SECURE
        value: "true"
